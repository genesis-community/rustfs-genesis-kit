---
name:    rustfs
version: 0.1.0

author:
  - Wayne Seguin <weseguin@fivetwenty.io>
code:    https://github.com/genesis-community/rustfs-genesis-kit
docs:    https://genesisproject.io/docs/

genesis_version_min: 3.1.0

services:
- s3

supports:
- aws
- azure
- gcp
- openstack
- vsphere
- stackit

required_configs:
  blueprint: []

certificates:
  base:
    certs:
      ca: { valid_for: 10y }
      peer:
        valid_for: 10y
        names:
          - rustfs_cluster_peer
          - 127.0.0.1
      # Client-facing S3 API TLS certificate.
      api:
        valid_for: 2y
        names:
          - "${meta.domain}"
          - 127.0.0.1
