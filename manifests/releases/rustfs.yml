# The rustfs BOSH release is not yet published to a public blobstore. Build it
# from the source repo (src/releases/rustfs) and upload to the director before
# deploying:
#
#   cd src/releases/rustfs
#   bosh create-release --force --name rustfs --version 0.1.4 --tarball=/tmp/rustfs-0.1.4.tgz
#   genesis <env> bosh upload-release /tmp/rustfs-0.1.4.tgz
#
# Once a public release is published, add `url:` and `sha1:` here so Genesis can
# upload it automatically.
releases:
- name:    rustfs
  version: 0.1.4
